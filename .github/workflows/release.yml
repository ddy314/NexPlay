name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            artifact_pattern: |
              release/*.exe
              release/*.blockmap
          - platform: macos
            os: macos-latest
            artifact_pattern: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
          - platform: linux
            os: ubuntu-latest
            artifact_pattern: |
              release/*.AppImage
              release/*.deb
              release/*.tar.gz
              release/*.blockmap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install mpv pkg-config

      - name: Install npm dependencies
        run: npm ci

      - name: Build release package
        run: npm run dist
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexplay-${{ matrix.platform }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_pattern }}
          fail_on_unmatched_files: true
